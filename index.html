<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Academic Webpage" />
  <meta name="author" content="senli1073" />
  <title id="title"></title>

  <link rel="icon" type="image/x-icon" href="/static/assets/favicon.ico" />
  <link rel="preload" as="image" href="/static/assets/img/background.jpeg" fetchpriority="high" />
  <link rel="preload" href="/static/css/styles.css" as="style" />
  <link rel="stylesheet" href="/static/css/styles.css" />
  <link rel="preload" href="/static/css/main.css" as="style" />
  <link rel="stylesheet" href="/static/css/main.css" />
  <link rel="stylesheet" href="/static/css/bootstrap-icons.css" />

  <style>
    /* Reset some default browser styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box; /* Ensure consistent box model across browsers */
    }

    /* Photo container styling */
    #avatar {
      width: 140px;  /* Make the photo smaller */
      height: 180px; /* Adjust photo height */
      margin: -40px 0 20px 0; /* Adjust margins to lift text and separate it from photo */
      display: block; /* Ensure right alignment works */
      margin-left: auto; /* Push the photo to the right */
      margin-right: 0;  /* Ensure there is no margin on the right side */
    }

    #avatar img {
      width: 100%;  /* Make the image fill the container */
      height: 100%; /* Adjust photo height */
      object-fit: cover;  /* Ensure the image covers the area without distortion */
      display: block;
    }

    /* Mobile adjustments */
    @media (max-width: 768px) {
      #avatar {
        width: 120px;  /* Adjust for smaller screen size */
        height: 160px; /* Adjust for smaller screen size */
        margin: -30px 0 15px 0; /* Adjust margins for mobile to avoid tight spacing */
      }
      #avatar img {
        width: 100%;  /* Make the image fill the container */
        height: 100%; /* Adjust photo height */
      }
    }
  </style>

  <script defer src="/static/js/bootstrap.bundle.min.js"></script>
  <script defer src="/static/js/marked.min.js"></script>
  <script defer src="/static/js/js-yaml.min.js"></script>
  <script src="/static/js/scripts.js" defer></script>

  <script>
    function needsMathJax() {
      const ids = ["home-md", "publications-md", "patents-md"];
      for (const id of ids) {
        const el = document.getElementById(id);
        if (!el) continue;
        const t = el.innerText || "";
        if (t.includes("$$") || t.includes("\\(") || t.includes("\\[") || t.includes("$")) return true;
      }
      return false;
    }

    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        tags: 'ams'
      },
      svg: { fontCache: 'global' }
    };

    window.addEventListener("load", () => {
      if (!needsMathJax()) return;
      const s = document.createElement("script");
      s.async = true;
      s.src = "/static/js/tex-svg.js";
      document.head.appendChild(s);
    });
  </script>
</head>

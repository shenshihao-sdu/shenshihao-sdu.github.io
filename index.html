<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Academic Webpage">
  <meta name="author" content="ss">

  <title id="title"></title>

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="/static/assets/favicon.ico">

  <!-- Core CSS -->
  <link rel="stylesheet" href="/static/css/styles.css">
  <link rel="stylesheet" href="/static/css/main.css">

  <!-- Prefer local icon font to avoid slow/blocked CDNs in CN networks -->
  <!-- Put bootstrap-icons.css + fonts under /static/vendor/bootstrap-icons/ -->
  <link rel="stylesheet" href="/static/css/bootstrap-icons.css">

  <!-- JS (defer to avoid blocking rendering) -->
  <script defer src="/static/js/bootstrap.bundle.min.js"></script>
  <script defer src="/static/js/marked.min.js"></script>
  <script defer src="/static/js/js-yaml.min.js"></script>
  <script defer src="/static/js/scripts.js"></script>

  <!-- MathJax: load only when needed (better for mobile) -->
  <script>
    function needsMathJax() {
      // Load MathJax only if the page likely contains TeX delimiters
      const t = document.body ? (document.body.innerText || "") : "";
      return t.includes("$$") || t.includes("\\(") || t.includes("\\[") || t.includes("$");
    }

    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        tags: 'ams'
      },
      svg: { fontCache: 'global' }
    };

    window.addEventListener("DOMContentLoaded", () => {
      if (!needsMathJax()) return;

      // Prefer local MathJax to avoid CDN latency in CN networks:
      // Download MathJax v3 es5/tex-svg.js to /static/js/tex-svg.js
      const s = document.createElement("script");
      s.async = true;
      s.src = "/static/js/tex-svg.js";
      document.head.appendChild(s);
    });
  </script>
</head>

<body id="page-top">
  <!-- Navigation -->
  <nav class="header navbar navbar-expand-lg navbar-light fixed-top shadow-sm" id="mainNav">
    <div class="container px-5">
      <a id="page-top-title" class="navbar-brand fw-bold" href="#page-top"></a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive"
              aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
        MENU <i class="bi-list"></i>
      </button>

      <div class="collapse navbar-collapse" id="navbarResponsive">
        <ul class="navbar-nav ms-auto me-4 my-3 my-lg-0">
          <li class="nav-item"><a class="nav-link me-lg-3" href="#page-top">HOME</a></li>
          <li class="nav-item"><a class="nav-link me-lg-3" href="#publications">PUBLICATIONS</a></li>
          <li class="nav-item"><a class="nav-link me-lg-3" href="#patents">PATENTS</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Top Section -->
  <section class="top-section" style="background-image: url('/static/assets/img/background.jpeg');">
    <div class="top-section-content">
      <div class="container px-5">
        <h2 id="top-section-bg-text" class="text-white display-3 lh-1 font-alt"></h2>
      </div>
    </div>
  </section>

  <!-- Photo -->
  <div class="container px-5">
    <div id="avatar">
      <img class="shadow"
           src="/static/assets/img/photo.png"
           width="320" height="400"
           loading="lazy" decoding="async"
           alt="Photo">
    </div>
  </div>

  <!-- Home -->
  <section class="bg-gradient-primary-to-secondary-light mt5 md5" id="home">
    <div class="container px-5">
      <header>
        <h2 id="home-subtitle"></h2>
      </header>
      <div class="main-body" id="home-md"></div>
    </div>
  </section>

  <!-- Publications -->
  <section class="bg-gradient-primary-to-secondary-gray mt5 md5" id="publications">
    <div class="container px-5">
      <header>
        <h2 id="publications-subtitle"><i class="bi bi-file-text-fill"></i>&nbsp;PUBLICATIONS</h2>
      </header>
      <div class="main-body" id="publications-md"></div>
    </div>
  </section>

  <!-- Patents -->
  <section class="bg-gradient-primary-to-secondary-light mt5 md5" id="patents">
    <div class="container px-5">
      <header>
        <h2 id="patents-subtitle"><i class="bi bi-lightbulb-fill"></i>&nbsp;PATENTS</h2>
      </header>
      <div class="main-body" id="patents-md"></div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="bg-bottom text-center py-3">
    <div class="container px-5">
      <div class="text-white-50 small">
        <div id="copyright-text" class="mb-2"></div>
      </div>
    </div>
  </footer>
</body>
</html>

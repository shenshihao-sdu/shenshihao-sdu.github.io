<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Academic Webpage" />
  <meta name="author" content="senli1073" />
  <title id="title"></title>

  <link rel="icon" type="image/x-icon" href="/static/assets/favicon.ico" />

  <link rel="preload" as="image" href="/static/assets/img/background.jpeg" fetchpriority="high" />
  <link rel="preload" href="/static/css/styles.css" as="style" />
  <link rel="stylesheet" href="/static/css/styles.css" />
  <link rel="preload" href="/static/css/main.css" as="style" />
  <link rel="stylesheet" href="/static/css/main.css" />
  <link rel="stylesheet" href="/static/css/bootstrap-icons.css" />

  <style>
    #avatar {
      width: 320px;
      height: 400px;
      margin: -120px 0 40px 0;
      display: flex;
      align-items: center;
      justify-content: flex-end;  /* 设置为右对齐 */
    }
    #avatar img {
      width: 320px;
      height: 400px;
      object-fit: cover;
      display: block;
    }

    /* Mobile tweaks (no background-mobile.jpeg to avoid 404) */
    @media (max-width: 768px) {
      #avatar {
        width: 240px;
        height: 300px;
        margin: -90px 0 30px 0;
        justify-content: flex-end; /* 确保移动端也是右对齐 */
      }
      #avatar img {
        width: 240px;
        height: 300px;
      }
    }
  </style>

  <script defer src="/static/js/bootstrap.bundle.min.js"></script>
  <script defer src="/static/js/marked.min.js"></script>
  <script defer src="/static/js/js-yaml.min.js"></script>
  <script src="/static/js/scripts.js" defer></script>

  <script>
    function needsMathJax() {
      const ids = ["home-md", "publications-md", "patents-md"];
      for (const id of ids) {
        const el = document.getElementById(id);
        if (!el) continue;
        const t = el.innerText || "";
        if (t.includes("$$") || t.includes("\\(") || t.includes("\\[") || t.includes("$")) return true;
      }
      return false;
    }

    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        tags: 'ams'
      },
      svg: { fontCache: 'global' }
    };

    window.addEventListener("load", () => {
      if (!needsMathJax()) return;
      const s = document.createElement("script");
      s.async = true;
      s.src = "/static/js/tex-svg.js";
      document.head.appendChild(s);
    });
  </script>
</head>
